name: EHR Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore EHR.Platform.slnx

      - name: Build
        run: dotnet build EHR.Platform.slnx --no-restore

      - name: Test
        run: dotnet test EHR.Platform.slnx --no-build

  compose-e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      JWT_SIGNING_KEY: ci-signing-key-change-before-production-32chars
      RUN_INFRA_TESTS: "true"
      RUN_E2E_TESTS: "true"
      GATEWAY_BASE_URL: http://localhost:5190

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Start Compose stack
        run: docker compose up --build -d

      - name: Wait for gateway
        shell: bash
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:5190/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs
          exit 1

      - name: Run infrastructure and gateway tests
        run: dotnet test tests/EHR.Infrastructure.Tests/EHR.Infrastructure.Tests.csproj

      - name: Stop Compose stack
        if: always()
        run: docker compose down -v
