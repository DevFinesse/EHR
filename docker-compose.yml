services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9997
      KAFKA_JMX_HOSTNAME: kafka
    ports:
      - "9092:29092"
    expose:
      - "9997"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: kafbat/kafka-ui:v1.4.2
    environment:
      KAFKA_CLUSTERS_0_NAME: ehr-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_METRICS_PORT: 9997
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8081:8080"
    depends_on:
      kafka:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:9.12.0
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "8082:80"
    depends_on:
      tenant-db:
        condition: service_healthy
      identity-db:
        condition: service_healthy
      patient-db:
        condition: service_healthy
      appointment-db:
        condition: service_healthy
      encounter-db:
        condition: service_healthy
      audit-db:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "1025:1025"
      - "8025:8025"

  tenant-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ehr_tenant
      POSTGRES_USER: ehr
      POSTGRES_PASSWORD: ehr_dev_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehr -d ehr_tenant"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ehr_identity
      POSTGRES_USER: ehr
      POSTGRES_PASSWORD: ehr_dev_password
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehr -d ehr_identity"]
      interval: 5s
      timeout: 5s
      retries: 10

  patient-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ehr_patient
      POSTGRES_USER: ehr
      POSTGRES_PASSWORD: ehr_dev_password
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehr -d ehr_patient"]
      interval: 5s
      timeout: 5s
      retries: 10

  appointment-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ehr_appointment
      POSTGRES_USER: ehr
      POSTGRES_PASSWORD: ehr_dev_password
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehr -d ehr_appointment"]
      interval: 5s
      timeout: 5s
      retries: 10

  encounter-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ehr_encounter
      POSTGRES_USER: ehr
      POSTGRES_PASSWORD: ehr_dev_password
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehr -d ehr_encounter"]
      interval: 5s
      timeout: 5s
      retries: 10

  audit-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ehr_audit
      POSTGRES_USER: ehr
      POSTGRES_PASSWORD: ehr_dev_password
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehr -d ehr_audit"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/EHR.ApiGateway/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-development-signing-key-change-before-production-32chars}
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      ReverseProxy__Clusters__tenant__Destinations__default__Address: http://tenant-service:8080/
      ReverseProxy__Clusters__identity__Destinations__default__Address: http://identity-service:8080/
      ReverseProxy__Clusters__patient__Destinations__default__Address: http://patient-service:8080/
      ReverseProxy__Clusters__appointment__Destinations__default__Address: http://appointment-service:8080/
      ReverseProxy__Clusters__encounter__Destinations__default__Address: http://encounter-service:8080/
      ReverseProxy__Clusters__audit__Destinations__default__Address: http://audit-service:8080/
    ports:
      - "5190:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      tenant-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      patient-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      encounter-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy

  tenant-service:
    build:
      context: .
      dockerfile: src/Services/TenantService/EHR.TenantService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Kafka__BootstrapServers: kafka:9092


      Jwt__SigningKey: ${JWT_SIGNING_KEY:-development-signing-key-change-before-production-32chars}
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      ConnectionStrings__TenantDb: Host=tenant-db;Port=5432;Database=ehr_tenant;Username=ehr;Password=ehr_dev_password
    ports:
      - "5191:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      kafka:
        condition: service_healthy
      tenant-db:
        condition: service_healthy
      jaeger:
        condition: service_started

  identity-service:
    build:
      context: .
      dockerfile: src/Services/IdentityService/EHR.IdentityService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Kafka__BootstrapServers: kafka:9092
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-development-signing-key-change-before-production-32chars}
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      ConnectionStrings__IdentityDb: Host=identity-db;Port=5432;Database=ehr_identity;Username=ehr;Password=ehr_dev_password
      Kafka__ConsumerGroupId: identity-service
      Kafka__ConsumerTopics__0: tenant.hospital.registered
      Email__From: no-reply@ehr-platform.local
      Email__Smtp__Host: mailpit
      Email__Smtp__Port: 1025
      Email__Smtp__EnableSsl: "false"
      SeedAdmin__Enabled: "true"
      SeedAdmin__Email: ${SEED_ADMIN_EMAIL:-admin@ehr.local}
      SeedAdmin__Password: ${SEED_ADMIN_PASSWORD:-Admin123!ChangeMe}
      SeedAdmin__TenantId: ${SEED_ADMIN_TENANT_ID:-platform}
      SeedAdmin__FullName: ${SEED_ADMIN_FULL_NAME:-Platform Super Admin}
      SeedAdmin__Role: ${SEED_ADMIN_ROLE:-Super Admin}
      SeedAdmin__Department: ${SEED_ADMIN_DEPARTMENT:-Platform}
    ports:
      - "5192:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      kafka:
        condition: service_healthy
      identity-db:
        condition: service_healthy
      jaeger:
        condition: service_started
      mailpit:
        condition: service_started

  patient-service:
    build:
      context: .
      dockerfile: src/Services/PatientService/EHR.PatientService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Kafka__BootstrapServers: kafka:9092
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-development-signing-key-change-before-production-32chars}
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      ConnectionStrings__PatientDb: Host=patient-db;Port=5432;Database=ehr_patient;Username=ehr;Password=ehr_dev_password
      Kafka__ConsumerGroupId: patient-service
      Kafka__ConsumerTopics__0: tenant.hospital.registered
    ports:
      - "5193:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      kafka:
        condition: service_healthy
      patient-db:
        condition: service_healthy
      jaeger:
        condition: service_started

  appointment-service:
    build:
      context: .
      dockerfile: src/Services/AppointmentService/EHR.AppointmentService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Kafka__BootstrapServers: kafka:9092
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-development-signing-key-change-before-production-32chars}
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      ConnectionStrings__AppointmentDb: Host=appointment-db;Port=5432;Database=ehr_appointment;Username=ehr;Password=ehr_dev_password
      Kafka__ConsumerGroupId: appointment-service
      Kafka__ConsumerTopics__0: patient.created
    ports:
      - "5194:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      kafka:
        condition: service_healthy
      appointment-db:
        condition: service_healthy
      jaeger:
        condition: service_started

  encounter-service:
    build:
      context: .
      dockerfile: src/Services/EncounterService/EHR.EncounterService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Kafka__BootstrapServers: kafka:9092
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-development-signing-key-change-before-production-32chars}
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      ConnectionStrings__EncounterDb: Host=encounter-db;Port=5432;Database=ehr_encounter;Username=ehr;Password=ehr_dev_password
    ports:
      - "5195:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      kafka:
        condition: service_healthy
      encounter-db:
        condition: service_healthy
      jaeger:
        condition: service_started

  audit-service:
    build:
      context: .
      dockerfile: src/Services/AuditService/EHR.AuditService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Kafka__BootstrapServers: kafka:9092
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-development-signing-key-change-before-production-32chars}
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      ConnectionStrings__AuditDb: Host=audit-db;Port=5432;Database=ehr_audit;Username=ehr;Password=ehr_dev_password
      Kafka__ConsumerGroupId: audit-service
      Kafka__ConsumerTopics__0: tenant.hospital.registered
      Kafka__ConsumerTopics__1: identity.staff.created
      Kafka__ConsumerTopics__2: patient.created
      Kafka__ConsumerTopics__3: appointment.booked
      Kafka__ConsumerTopics__4: patient.checked_in
      Kafka__ConsumerTopics__5: encounter.started
      Kafka__ConsumerTopics__6: vitals.recorded
      Kafka__ConsumerTopics__7: diagnosis.added
      Kafka__ConsumerTopics__8: encounter.completed
    ports:
      - "5196:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      kafka:
        condition: service_healthy
      audit-db:
        condition: service_healthy
      jaeger:
        condition: service_started
